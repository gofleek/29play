<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>29 Card Game</title>
<link rel="manifest" href="/manifest.json">
<meta name="theme-color" content="#06080d">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{width:100%;height:100%;overflow:hidden;background:#06080d;color:#e8eaf6;font-family:'Segoe UI',Arial,sans-serif;}

/* ── ANIMATED BACKGROUND ── */
#canvas{position:fixed;inset:0;z-index:0;}

/* ── LAYOUT ── */
.landing{position:relative;z-index:1;width:100%;height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px 16px;gap:0;}

/* ── LOGO ── */
.logo-wrap{text-align:center;margin-bottom:clamp(24px,5vh,48px);}
.logo-suits{font-size:clamp(28px,6vw,52px);letter-spacing:12px;margin-bottom:8px;animation:suitPulse 3s ease-in-out infinite;}
@keyframes suitPulse{0%,100%{opacity:.7;transform:scale(1)}50%{opacity:1;transform:scale(1.04)}}
.logo-title{font-size:clamp(36px,8vw,76px);font-weight:900;letter-spacing:-2px;line-height:1;background:linear-gradient(135deg,#ffd54f 0%,#ff8f00 40%,#ffd54f 80%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;background-size:200% auto;animation:shimmer 3s linear infinite;}
@keyframes shimmer{0%{background-position:0% 50%}100%{background-position:200% 50%}}
.logo-sub{font-size:clamp(12px,2vw,16px);color:#3a6080;letter-spacing:.5px;margin-top:8px;}

/* ── CARD ── */
.card{background:rgba(10,20,38,.9);border:1.5px solid #1a2f50;border-radius:22px;padding:clamp(24px,5vh,40px) clamp(20px,5vw,40px);width:100%;max-width:420px;backdrop-filter:blur(12px);box-shadow:0 20px 60px rgba(0,0,0,.7),0 0 0 1px rgba(255,213,79,.06);animation:cardIn .5s cubic-bezier(.34,1.56,.64,1) both;}
@keyframes cardIn{from{transform:translateY(30px) scale(.95);opacity:0}to{transform:none;opacity:1}}

/* ── CHOICE SCREEN ── */
.choice-title{text-align:center;font-size:clamp(14px,2.5vw,18px);color:#5a8aaa;margin-bottom:clamp(20px,4vh,32px);font-weight:500;}
.choice-btns{display:flex;flex-direction:column;gap:12px;}
.choice-btn{width:100%;padding:clamp(14px,2.5vh,18px) 20px;border:none;border-radius:14px;font-size:clamp(14px,2.2vw,17px);font-weight:700;cursor:pointer;display:flex;align-items:center;gap:14px;transition:transform .15s,box-shadow .15s;}
.choice-btn:hover{transform:translateY(-2px);}
.choice-btn:active{transform:translateY(0);}
.choice-btn .btn-icon{font-size:clamp(22px,4vw,30px);flex-shrink:0;}
.choice-btn .btn-text{text-align:left;line-height:1.3;}
.choice-btn .btn-label{display:block;font-size:clamp(14px,2vw,17px);}
.choice-btn .btn-desc{display:block;font-size:clamp(10px,1.4vw,12px);opacity:.75;font-weight:500;margin-top:2px;}
.btn-guest{background:linear-gradient(135deg,#1a3a60,#0e2240);border:1.5px solid #1c3a60;color:#8ab4f8;}
.btn-guest:hover{box-shadow:0 8px 24px rgba(26,58,96,.5);}
.btn-auth{background:linear-gradient(135deg,#ffd54f,#ff8f00);color:#1a0e00;}
.btn-auth:hover{box-shadow:0 8px 24px rgba(255,143,0,.4);}
.divider{display:flex;align-items:center;gap:10px;margin:4px 0;}
.divider::before,.divider::after{content:'';flex:1;border-top:1px solid #0e1e34;}
.divider span{font-size:11px;color:#1a2a40;letter-spacing:.4px;}

/* ── CHIPS PREVIEW ── */
.chips-row{display:flex;justify-content:center;gap:16px;margin-top:16px;padding-top:16px;border-top:1px solid #0e1e34;}
.chip-info{text-align:center;}
.chip-val{font-size:clamp(18px,3.5vw,24px);font-weight:800;color:#ffd54f;}
.chip-lbl{font-size:10px;color:#2a4060;text-transform:uppercase;letter-spacing:.5px;margin-top:2px;}

/* ── PANES ── */
.pane{display:none;} .pane.active{display:block;}

/* ── FORM ELEMENTS ── */
.field{margin-bottom:13px;}
.field label{display:block;font-size:11px;color:#3a5070;text-transform:uppercase;letter-spacing:.5px;margin-bottom:5px;font-weight:600;}
.field input{width:100%;padding:12px 14px;background:#070f1c;border:1.5px solid #1a2f50;border-radius:10px;color:#e8eaf6;font-size:15px;outline:none;transition:border-color .15s;}
.field input:focus{border-color:#4a90d9;}
.field input::placeholder{color:#1a2f40;}
.char-count{font-size:11px;color:#2a3a50;text-align:right;margin-top:3px;}
.pane-title{font-size:clamp(16px,3vw,20px);font-weight:800;color:#e8eaf6;margin-bottom:18px;display:flex;align-items:center;gap:10px;}
.btn-back{background:none;border:none;color:#3a6080;font-size:13px;cursor:pointer;padding:0 0 16px;display:flex;align-items:center;gap:4px;}
.btn-back:hover{color:#8ab4f8;}
.btn-submit{width:100%;padding:14px;border:none;border-radius:12px;background:linear-gradient(135deg,#ffd54f,#ff8f00);color:#1a0e00;font-size:16px;font-weight:800;cursor:pointer;margin-top:6px;transition:opacity .15s,transform .1s;}
.btn-submit:hover{opacity:.9;transform:translateY(-1px);}
.btn-submit:disabled{opacity:.35;cursor:not-allowed;transform:none;}
.auth-tabs{display:flex;gap:0;margin-bottom:18px;border-bottom:1px solid #0e1e34;}
.auth-tab{flex:1;padding:10px;font-size:13px;font-weight:700;color:#1a3050;cursor:pointer;border-bottom:2px solid transparent;text-align:center;transition:all .15s;}
.auth-tab.active{color:#8ab4f8;border-bottom-color:#4a90d9;}
.form-err{color:#ef5350;font-size:12px;min-height:16px;margin-bottom:4px;}
.form-ok{color:#66bb6a;font-size:12px;min-height:16px;margin-bottom:4px;}

/* ── CHIPS BADGE ── */
.chips-badge{display:inline-flex;align-items:center;gap:6px;background:rgba(255,213,79,.1);border:1px solid rgba(255,213,79,.25);border-radius:20px;padding:5px 12px;font-size:13px;font-weight:700;color:#ffd54f;margin-bottom:16px;}

/* ── RESPONSIVE ── */
@media(max-height:600px){.logo-wrap{margin-bottom:14px;}.card{padding:16px 18px;}}
</style>
</head>
<body>
<canvas id="canvas"></canvas>
<div class="landing">
  <div class="logo-wrap">
    <div class="logo-suits">♠ ♥ ♦ ♣</div>
    <div class="logo-title">29</div>
    <div class="logo-sub">Classic South Asian Card Game · Online Multiplayer</div>
  </div>

  <div class="card">

    <!-- PANE: CHOICE -->
    <div class="pane active" id="paneChoice">
      <div class="choice-title">How would you like to play?</div>
      <div class="choice-btns">
        <button class="choice-btn btn-auth" onclick="showPane('paneAuth')">
          <span class="btn-icon">👤</span>
          <span class="btn-text">
            <span class="btn-label">Sign In / Register</span>
            <span class="btn-desc">Start with 100 chips · Save progress · Transfer chips</span>
          </span>
        </button>
        <div class="divider"><span>OR</span></div>
        <button class="choice-btn btn-guest" onclick="showPane('paneGuest')">
          <span class="btn-icon">🎭</span>
          <span class="btn-text">
            <span class="btn-label">Continue as Guest</span>
            <span class="btn-desc">Quick play · 10 chips to start · No account needed</span>
          </span>
        </button>
      </div>
      <div class="chips-row">
        <div class="chip-info"><div class="chip-val">🪙 2</div><div class="chip-lbl">Sit-in cost</div></div>
        <div class="chip-info"><div class="chip-val">🪙 4</div><div class="chip-lbl">Win reward</div></div>
        <div class="chip-info"><div class="chip-val">🪙 100</div><div class="chip-lbl">Register bonus</div></div>
      </div>
    </div>

    <!-- PANE: GUEST -->
    <div class="pane" id="paneGuest">
      <button class="btn-back" onclick="showPane('paneChoice')">← Back</button>
      <div class="pane-title">🎭 Guest Entry</div>
      <div class="chips-badge">🪙 10 chips to start</div>
      <div class="field">
        <label>Your Name <span style="color:#2a4060">(max 8 characters)</span></label>
        <input type="text" id="guestName" maxlength="8" placeholder="Nickname…" autocomplete="off" oninput="updateCharCount(this,'guestCount')">
        <div class="char-count" id="guestCount">0 / 8</div>
      </div>
      <div class="form-err" id="guestErr"></div>
      <button class="btn-submit" onclick="enterAsGuest()">Enter Lobby →</button>
    </div>

    <!-- PANE: AUTH -->
    <div class="pane" id="paneAuth">
      <button class="btn-back" onclick="showPane('paneChoice')">← Back</button>
      <div class="auth-tabs">
        <div class="auth-tab active" id="tabSignIn" onclick="switchAuthTab('signin')">Sign In</div>
        <div class="auth-tab" id="tabRegister" onclick="switchAuthTab('register')">Register</div>
      </div>

      <!-- SIGN IN -->
      <div id="formSignin">
        <div class="field"><label>Username</label><input type="text" id="siUser" placeholder="your_username" autocomplete="username"></div>
        <div class="field"><label>Password</label><input type="password" id="siPass" placeholder="Password" autocomplete="current-password"></div>
        <div class="form-err" id="siErr"></div>
        <button class="btn-submit" onclick="doSignIn()">Sign In →</button>
      </div>

      <!-- REGISTER -->
      <div id="formRegister" style="display:none">
        <div class="field"><label>Username <span style="color:#2a4060">(3–20 chars, a-z 0-9 _)</span></label><input type="text" id="regUser" placeholder="cool_name" maxlength="20" autocomplete="username"></div>
        <div class="field"><label>Display Name</label><input type="text" id="regDisplay" placeholder="How others see you" maxlength="30" autocomplete="name"></div>
        <div class="field"><label>Password <span style="color:#2a4060">(min 6 chars)</span></label><input type="password" id="regPass" placeholder="Choose a password" autocomplete="new-password"></div>
        <div class="chips-badge" style="margin-top:4px;">🪙 100 chips on registration</div>
        <div class="form-err" id="regErr"></div>
        <button class="btn-submit" onclick="doRegister()">Create Account →</button>
      </div>
    </div>

  </div>
</div>

<script>
'use strict';

// ── CANVAS BACKGROUND ─────────────────────────────────────
(function(){
  const canvas=document.getElementById('canvas');
  const ctx=canvas.getContext('2d');
  let W,H;
  function resize(){W=canvas.width=window.innerWidth;H=canvas.height=window.innerHeight;}
  resize();window.addEventListener('resize',resize);

  const SUITS=['♠','♥','♦','♣'];
  const COLORS=['rgba(232,234,246,','rgba(229,57,53,','rgba(229,57,53,','rgba(232,234,246,'];
  const particles=Array.from({length:22},(_,i)=>({
    x:Math.random()*1200,y:Math.random()*900,
    vx:(Math.random()-.5)*.3,vy:-.2-Math.random()*.4,
    suit:i%4,size:16+Math.random()*22,
    alpha:Math.random()*.12+.03,rot:Math.random()*Math.PI*2,
    rotV:(Math.random()-.5)*.015,
  }));

  function draw(){
    ctx.clearRect(0,0,W,H);
    for(const p of particles){
      ctx.save();
      ctx.translate(p.x%W,((p.y%H)+H)%H);
      ctx.rotate(p.rot);
      ctx.globalAlpha=p.alpha;
      ctx.font=`${p.size}px serif`;
      ctx.fillStyle=COLORS[p.suit]+'1)';
      ctx.fillText(SUITS[p.suit],0,0);
      ctx.restore();
      p.x+=p.vx;p.y+=p.vy;p.rot+=p.rotV;
      if(p.y<-60)p.y=H+20;
      if(p.x<-60)p.x=W+20;
      if(p.x>W+60)p.x=-20;
    }
    requestAnimationFrame(draw);
  }
  draw();
})();

// ── IDENTITY ─────────────────────────────────────────────
const CLIENT_ID=(()=>{let id=sessionStorage.getItem('29_cid')||localStorage.getItem('29_cid');if(!id){id='c_'+Math.random().toString(36).slice(2,12);}sessionStorage.setItem('29_cid',id);localStorage.setItem('29_cid',id);return id;})();

// ── AUTO-REDIRECT IF ALREADY LOGGED IN ───────────────────
(async function(){
  const forceRegister = new URLSearchParams(window.location.search).get('register') === '1';
  if (!forceRegister) {
    const token=localStorage.getItem('29_token');
    if(token){
      try{
        const r=await fetch('/api/auth/me',{headers:{'Authorization':'Bearer '+token}});
        if(r.ok){window.location.href='/lobby';return;}
      }catch(e){}
      localStorage.removeItem('29_token');
    }
    // Check if guest already set up
    const guestName=localStorage.getItem('29_gname');
    if(guestName){
      try{
        const r=await fetch(`/api/guest/me?clientId=${CLIENT_ID}`);
        if(r.ok){window.location.href='/lobby';return;}
      }catch(e){}
    }
  } else {
    // Came here to register - show auth pane on register tab immediately
    showPane('paneAuth');
    switchAuthTab('register');
  }
})();

// ── PANES ─────────────────────────────────────────────────
function showPane(id){
  document.querySelectorAll('.pane').forEach(p=>p.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  // focus first input
  const inp=document.getElementById(id).querySelector('input');
  if(inp)setTimeout(()=>inp.focus(),120);
}

function updateCharCount(input,countId){
  document.getElementById(countId).textContent=input.value.length+' / '+input.maxLength;
}

// ── AUTH TABS ─────────────────────────────────────────────
function switchAuthTab(tab){
  document.getElementById('tabSignIn').classList.toggle('active',tab==='signin');
  document.getElementById('tabRegister').classList.toggle('active',tab==='register');
  document.getElementById('formSignin').style.display=tab==='signin'?'block':'none';
  document.getElementById('formRegister').style.display=tab==='register'?'block':'none';
  const inp=tab==='signin'?document.getElementById('siUser'):document.getElementById('regUser');
  setTimeout(()=>inp.focus(),60);
}

// ── GUEST ─────────────────────────────────────────────────
async function enterAsGuest(){
  const name=(document.getElementById('guestName').value||'').trim();
  const errEl=document.getElementById('guestErr');
  if(!name){errEl.textContent='Please enter a name.';return;}
  if(name.length>8){errEl.textContent='Max 8 characters.';return;}
  errEl.textContent='';
  try{
    const r=await fetch('/api/guest/start',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({name,clientId:CLIENT_ID})});
    const d=await r.json();
    if(d.ok){
      localStorage.setItem('29_gname',d.name);
      localStorage.removeItem('29_token');
      window.location.href='/lobby';
    } else errEl.textContent=d.error||'Failed. Try again.';
  }catch(e){errEl.textContent='Network error.';}
}

// ── SIGN IN ───────────────────────────────────────────────
async function doSignIn(){
  const username=document.getElementById('siUser').value.trim().toLowerCase();
  const password=document.getElementById('siPass').value;
  const errEl=document.getElementById('siErr');
  if(!username||!password){errEl.textContent='Fill in all fields.';return;}
  errEl.textContent='Signing in…';
  try{
    const r=await fetch('/api/auth/login',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({username,password})});
    const d=await r.json();
    if(d.ok){
      localStorage.setItem('29_token',d.token);
      localStorage.removeItem('29_gname');
      window.location.href='/lobby';
    } else errEl.textContent=d.error||'Login failed.';
  }catch(e){errEl.textContent='Network error.';}
}

// ── REGISTER ──────────────────────────────────────────────
async function doRegister(){
  const username=document.getElementById('regUser').value.trim().toLowerCase();
  const displayName=document.getElementById('regDisplay').value.trim();
  const password=document.getElementById('regPass').value;
  const errEl=document.getElementById('regErr');
  if(!username||!password){errEl.textContent='Fill in all fields.';return;}
  errEl.textContent='Creating account…';
  try{
    const r=await fetch('/api/auth/register',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({username,displayName,password})});
    const d=await r.json();
    if(d.ok){
      localStorage.setItem('29_token',d.token);
      localStorage.removeItem('29_gname');
      window.location.href='/lobby';
    } else errEl.textContent=d.error||'Registration failed.';
  }catch(e){errEl.textContent='Network error.';}
}

// ── KEYBOARD ──────────────────────────────────────────────
document.addEventListener('keydown',e=>{
  if(e.key!=='Enter')return;
  const active=document.querySelector('.pane.active');
  if(!active)return;
  if(active.id==='paneGuest')enterAsGuest();
  else if(active.id==='paneAuth'){
    if(document.getElementById('formSignin').style.display!=='none')doSignIn();
    else doRegister();
  }
});
</script>
</body>
</html>
